version: '3.8'

services:
  # Base de données PostgreSQL 
  db:
    image: postgres:15
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hackire_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

  # Backend Django
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://admin:password@db:5432/hackire_db
      - DEBUG=1
    depends_on:
      - db

  # Frontend React
  frontend:
    build: ./my-ecom-app
    volumes:
      - ./my-ecom-app:/app
      - /app/node_modules # Évite d'écraser les modules installés dans le conteneur
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data: